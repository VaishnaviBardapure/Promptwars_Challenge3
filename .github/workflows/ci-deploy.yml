name: CI / Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build image and push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/promptwars:latest
          context: .

      - name: Set IMAGE output
        run: echo "IMAGE=ghcr.io/${{ github.repository_owner }}/promptwars:latest" >> $GITHUB_OUTPUT

  deploy-render:
    name: Trigger Render deploy (optional)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.RENDER_API_KEY && secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Trigger deploy
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/promptwars:latest
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Triggering deploy for service $RENDER_SERVICE_ID"
          curl -s -X POST https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{ \"dockerImage\": \"$IMAGE\" }"
